[tool.ruff]
# Match project conventions: most lines stay under 100, Plotly/HTML strings stretch longer
line-length = 100
target-version = "py312"

# Lint all Python source
include = ["app.py", "src/**/*.py", "scripts/**/*.py", "LLM_Development/**/*.py"]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes (unused imports, undefined names)
    "I",      # isort (import ordering)
    "UP",     # pyupgrade (modern Python syntax)
    "B",      # flake8-bugbear (common pitfalls)
    "SIM",    # flake8-simplify (simplifiable code)
    "RUF",    # Ruff-specific rules
]
ignore = [
    "E501",   # line too long — handled by formatter; Plotly configs legitimately run wide
    "E402",   # module-level import not at top — Streamlit page_config must come before imports
    "B008",   # do not perform function calls in argument defaults — Streamlit uses this pattern
    "SIM108", # use ternary operator — readability preference
    "RUF001", # ambiguous unicode in strings — en dashes and arrows are intentional in UI text
    "RUF002", # ambiguous unicode in docstrings — multiplication sign etc. are intentional
    "RUF003", # ambiguous unicode in comments — en dashes are intentional
]

# Per-file rule overrides
[tool.ruff.lint.per-file-ignores]
"app.py" = ["E402"]                              # st.set_page_config before imports
"src/tab_*.py" = ["E402"]                         # tab modules may configure before imports
"LLM_Development/**/*.py" = ["F401"]              # scripts may have exploratory imports
"scripts/**/*.py" = ["F401"]                       # utility scripts

[tool.ruff.lint.isort]
# Match existing import convention: stdlib → third-party → local
known-first-party = ["src"]
known-third-party = ["streamlit", "plotly", "pandas", "numpy", "folium", "pdfplumber", "sklearn", "scipy", "pycountry", "country_converter", "anthropic", "sentence_transformers", "faiss"]
force-sort-within-sections = true
lines-after-imports = 2

[tool.ruff.format]
# Match existing style: double quotes, 4-space indent
quote-style = "double"
indent-style = "space"
line-ending = "auto"
docstring-code-format = true
